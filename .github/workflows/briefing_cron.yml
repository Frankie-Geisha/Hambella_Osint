name: 🗓️ 花魁简报系统 (每日8点/周日晚8点)

on:
  schedule:
    - cron: '0 0 * * *'
    - cron: '0 12 * * 0'
  workflow_dispatch:
    inputs:
      period_type:
        description: '🎯 手动试射：请选择生成日报还是周报'
        required: true
        type: choice
        options:
          - daily
          - weekly

jobs:
  run-briefing:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 检出最新代码
        uses: actions/checkout@v4
        
      - name: ⚙️ 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: 📦 安装军火库依赖
        run: pip install -r requirements.txt
        
      - name: 🚀 执行简报引擎
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            python briefing_generator.py ${{ github.event.inputs.period_type }}
          else
            DAY_OF_WEEK=$(date +%u)
            HOUR=$(date +%H)
            if [ "$DAY_OF_WEEK" -eq 7 ] && [ "$HOUR" -eq 12 ]; then
              python briefing_generator.py weekly
            else
              python briefing_generator.py daily
            fi
          fi
